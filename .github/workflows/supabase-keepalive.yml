name: Supabase keep-alive

# Pings the Supabase project every 5 minutes so the free-tier auto-pause
# never kicks in. Free-tier projects pause after 7 days of inactivity;
# resuming takes 15-30 s and is the primary cause of extreme login hangs.
#
# Setup: add VITE_SUPABASE_URL and VITE_SUPABASE_PUBLISHABLE_KEY as GitHub
# repository secrets (Settings → Secrets → Actions).

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes, 24/7
  workflow_dispatch:         # allow manual trigger from Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Ping Supabase health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "apikey: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}" \
            "${{ secrets.VITE_SUPABASE_URL }}/rest/v1/")
          echo "Supabase responded: HTTP $STATUS"
          # 200 = healthy, 401 = project awake but key wrong (still counts)
          if [ "$STATUS" -ge 500 ] || [ "$STATUS" -eq 000 ]; then
            echo "Unexpected status — project may be paused or unreachable"
            exit 1
          fi
